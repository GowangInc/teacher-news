name: Deploy Teacher News to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HAS_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate fresh parody data
        if: env.HAS_API_KEY == 'true' && !contains(github.event.head_commit.message, '[local-update]')
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          TOP_N: ${{ vars.TOP_N || '10' }}
          MAX_AGE_HOURS: ${{ vars.MAX_AGE_HOURS || '12' }}
          MAX_TOP_LEVEL: ${{ vars.MAX_TOP_LEVEL || '50' }}
          MAX_REPLIES_PER_NODE: ${{ vars.MAX_REPLIES_PER_NODE || '3' }}
          MAX_DEPTH: ${{ vars.MAX_DEPTH || '3' }}
          BATCH_SIZE: ${{ vars.BATCH_SIZE || '12' }}
        run: python3 generate.py

      - name: Commit generated data and database
        if: env.HAS_API_KEY == 'true' && !contains(github.event.head_commit.message, '[local-update]')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update data.json and database [skip ci]"
          file_pattern: data.json raw_hn.json teacher_news.db

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
